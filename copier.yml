_subdirectory: template
_answers_file: .copier-answers.yml
_min_copier_version: "9.4.0"

project_name:
  type: str
  help: "Human-readable project name"

harnesses:
  type: yaml
  help: "Which harness adapters to install (Claude Code is always installed)"
  default:
    copilot: false
    agents_md: false

modules:
  type: yaml
  help: "Which opt-in process modules to install"
  default:
    doc_drift_gate: false
    arch_onboarding: false
    feature_registry: false
    github_issues: false
    contracts_drift: false
    git_hooks: false
    contract_first: false
    parity: false
    security_floor: false

ci:
  type: yaml
  help: >-
    Which CI adapters render the process-gates job (github: Actions workflow;
    gitlab: includable job file + root .gitlab-ci.yml shim). With both off,
    enforcement degrades to the local git-hooks module only.
  default:
    github: true
    gitlab: false

github_repo:
  type: str
  help: >-
    GitHub repo as OWNER/REPO for issue tracking (optional — leave blank to skip
    the best-effort issue-existence check; issue-ref format is still enforced).
  default: ""
  when: "{{ modules.github_issues }}"

parity_surfaces:
  type: yaml
  help: >-
    Canonical surface list for the parity matrix (e.g. [web, mobile, cli]).
    Leave empty to skip exact-coverage enforcement (statuses are still checked).
  default: []
  when: "{{ modules.parity }}"
