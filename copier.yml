_subdirectory: template
_answers_file: .copier-answers.yml
_min_copier_version: "9.4.0"

project_name:
  type: str
  help: "Human-readable project name"

harnesses:
  type: yaml
  help: "Which harness adapters to install (Claude Code is always installed)"
  default:
    copilot: false
    agents_md: false

profile:
  type: str
  help: >-
    Module preset — a starting point, not a lock (the next question shows the
    derived set; adjust freely). It only seeds the INITIAL modules answer: on
    `copier update`, the recorded modules dict wins, so harden later by passing
    the new modules set explicitly (see BOOTSTRAP.md, "Later").
    minimal: core gates only (prototypes, smallest footprint).
    solo: + doc-drift + git-hooks (one developer, local enforcement).
    team: + feature-registry + github-issues on top of solo (shared backlog,
    acceptance traceability).
    custom: start all-off and pick modules yourself.
  choices:
    - minimal
    - solo
    - team
    - custom
  default: solo

modules:
  type: yaml
  help: "Which opt-in process modules to install (default derived from the profile; adjust freely)"
  default: "{doc_drift_gate: {{ profile in ['solo', 'team'] }}, arch_onboarding: false, feature_registry: {{ profile == 'team' }}, github_issues: {{ profile == 'team' }}, contracts_drift: false, git_hooks: {{ profile in ['solo', 'team'] }}, contract_first: false, parity: false, security_floor: false, sbom: false, telemetry: false, arch_docs: false, github_master: false}"

ci:
  type: yaml
  help: >-
    Which CI adapters render the process-gates job (github: Actions workflow;
    gitlab: includable job file + root .gitlab-ci.yml shim). With both off,
    enforcement degrades to the local git-hooks module only.
  default:
    github: true
    gitlab: false

github_repo:
  type: str
  help: >-
    GitHub repo as OWNER/REPO for issue tracking (optional — leave blank to skip
    the best-effort issue-existence check; issue-ref format is still enforced).
  default: ""
  when: "{{ modules.github_issues }}"

parity_surfaces:
  type: yaml
  help: >-
    Canonical surface list for the parity matrix (e.g. [web, mobile, cli]).
    Leave empty to skip exact-coverage enforcement (statuses are still checked).
  default: []
  when: "{{ modules.parity }}"
