name: ci
# push only on main: PR branches are covered by the pull_request trigger,
# otherwise every PR push runs the suite twice (same pattern as the rendered
# process-gates workflow).
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run pytest -v
