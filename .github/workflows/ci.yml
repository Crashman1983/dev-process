name: ci
# push only on main: PR branches are covered by the pull_request trigger,
# otherwise every PR push runs the suite twice (same pattern as the rendered
# process-gates workflow).
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run pytest -v
  portable-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync --group dev
      - run: uv run pytest tests/test_cross_platform_runtime.py -v
